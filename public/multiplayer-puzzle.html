<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplayer Puzzle - CodeQuest</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

</head>

<body>

<script>
if (!localStorage.getItem("playerId")) {
  window.location.href = "login.html";
}
</script>

<script src="js/navbar.js" defer></script>


<div class="container">

<h1>🤝 Multiplayer Puzzle</h1>

<p><strong>Room:</strong> <span id="roomCodeText"></span></p>
<p><strong>Player:</strong> <span id="playerNameText"></span></p>


<!-- SCOREBOARD -->
<div id="scoreboard" style="margin:15px 0;font-size:18px;">
🏆 Scoreboard<br>
Host: <span id="hostScore">0</span> |
Guest: <span id="guestScore">0</span>
</div>


<div id="progress"></div>

<div id="question"></div>

<form id="optionsForm"></form>

<button onclick="submitAnswer()">Submit</button>
<button onclick="showHint()">Show Hint</button>

<p id="hint" style="display:none"></p>

<p id="feedback"></p>

</div>


<!-- CHAT -->
<div id="chat-container" style="margin-top:30px;max-width:600px;">

<h3>💬 Chat</h3>

<div id="chat-box"
style="height:200px;overflow-y:auto;border:1px solid black;padding:10px;background:#650505">
</div>

<input
type="text"
id="chat-input"
placeholder="Type message..."
style="width:80%;padding:5px"
/>

<button onclick="sendMessage()" style="width:18%;padding:5px">
Send
</button>

</div>



<script>

const socket = io();

const roomCode = localStorage.getItem("roomCode");
const playerId = localStorage.getItem("playerId");
const playerName = localStorage.getItem("playerName");
const role = localStorage.getItem("playerRole") || "guest";

document.getElementById("roomCodeText").innerText = roomCode;
document.getElementById("playerNameText").innerText = playerName;


let currentQuestion = null;

let startTime = 0;

let timer = null;

let timeLeft = 10;


let totalQuestions = 0;

let answered = false;

let currentQuestionIndex = 0;

/* JOIN ROOM */

socket.on("connect", () => {

socket.emit("joinRoom", {
roomCode,
playerId,
playerName,
role
});

});



/* GAME START */

socket.on("startGame", (data) => {

loadQuestion(data);

});



/* NEXT QUESTION */

socket.on("nextQuestion", (data) => {

loadQuestion(data);

});



/* ROUND RESULT */

/* ROUND RESULT */

socket.on("roundResult", (data) => {

  clearInterval(timer);

  answered = true;

  const role = localStorage.getItem("playerRole");

  let correct = false;

  if (role === "host") {
    correct = data.hostCorrect;
  } else {
    correct = data.guestCorrect;
  }

  const feedback = document.getElementById("feedback");

  if (correct) {
    feedback.innerText = "✅ Correct Answer!";
    feedback.style.color = "lightgreen";
  } else {
    feedback.innerText = "❌ Wrong Answer! Correct: " + data.correctAnswer;
    feedback.style.color = "red";
  }

  document.getElementById("hostScore").innerText = data.scores.host;
  document.getElementById("guestScore").innerText = data.scores.guest;

});



/* GAME OVER */

socket.on("gameOver", (data) => {

clearInterval(timer);

localStorage.setItem("resultHostScore", data.scores.host);
localStorage.setItem("resultGuestScore", data.scores.guest);
localStorage.setItem("resultWinner", data.winner);

window.location.href = "multiplayer-result.html";

});



/* DISCONNECT */

socket.on("opponentDisconnected", () => {

clearInterval(timer);

alert("⚠ Opponent disconnected. You win!");

window.location.href = "multiplayer.html";

});



/* LOAD QUESTION */

function loadQuestion(data) {

  currentQuestion = data.question;
  currentQuestionIndex = data.index;
  totalQuestions = data.total;

  answered = false;
  clearInterval(timer);
  startTime = Date.now();

  if (data.index === 0) {
    document.getElementById("hostScore").innerText = 0;
    document.getElementById("guestScore").innerText = 0;
  }

  showQuestion(data.question, data.index, data.total);

  startTimer();
}



/* SHOW QUESTION */

function showQuestion(question, index, total) {

  document.getElementById("hint").style.display = "none";
  document.getElementById("feedback").innerText = "";

  document.getElementById("progress").innerText =
    "Question " + (index + 1) + " of " + total;

  document.getElementById("question").innerText = question.question;

  const form = document.getElementById("optionsForm");
  form.innerHTML = "";

  question.options.forEach(option => {

    const label = document.createElement("label");

    label.innerHTML =
      `<input type="radio" name="option" value="${option}"> ${option}`;

    form.appendChild(label);
    form.appendChild(document.createElement("br"));

  });

}



/* TIMER */

function startTimer() {

  timeLeft = 15;

  clearInterval(timer);

  timer = setInterval(() => {

    document.getElementById("progress").innerText =
      "Question " + (currentQuestionIndex + 1) +
      " of " + totalQuestions +
      " | ⏱ " + timeLeft + "s";

    timeLeft--;

    if (timeLeft < 0) {

      clearInterval(timer);

      autoSubmit();

    }

  }, 1000);

}



/* AUTO SUBMIT */

function autoSubmit() {

  if (answered) return;

  answered = true;

  socket.emit("submitAnswer", {
  roomCode,
  role,
  answer: "timeout",
  time: 10
  });

  document.getElementById("feedback").innerText =
  "⏳ Time up! Waiting for opponent...";
}



/* SUBMIT ANSWER */

function submitAnswer() {

  if (answered) return;

  const selected = document.querySelector("input[name='option']:checked");

  if (!selected) {
    alert("Please select an answer");
    return;
  }

  answered = true;

  clearInterval(timer);

  const timeTaken = Math.floor((Date.now() - startTime) / 1000);

  socket.emit("submitAnswer", {
    roomCode,
    role,
    answer: selected.value,
    time: timeTaken
  });

  document.getElementById("feedback").innerText =
  "⏳ Waiting for opponent...";

  document.querySelectorAll("input[name='option']").forEach(o => o.disabled = true);
}



/* HINT */

function showHint() {

const hint =
currentQuestion?.hints?.[0] || "No hint available";

document.getElementById("hint").innerText = "Hint: " + hint;

document.getElementById("hint").style.display = "block";

}



/* CHAT */

function sendMessage() {

const input = document.getElementById("chat-input");

const message = input.value.trim();

if (!message) return;

socket.emit("chatMessage", {
roomCode,
playerName,
message
});

input.value = "";

}



socket.on("chatMessage", ({ playerName, message }) => {

const chatBox = document.getElementById("chat-box");

const msg = document.createElement("div");

msg.innerHTML = `<b>${playerName}:</b> ${message}`;

chatBox.appendChild(msg);

chatBox.scrollTop = chatBox.scrollHeight;

});

</script>


</body>
</html>
