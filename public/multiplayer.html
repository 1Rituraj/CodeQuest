<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multiplayer Mode - CodeQuest</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- 🔒 Login check -->
  <script>
    if (!localStorage.getItem("playerId")) {
      window.location.href = "login.html";
    }
    // ⭐ Prevent opening multiplayer page if already in a room
    const roomCode = localStorage.getItem("roomCode");
    const role = localStorage.getItem("playerRole");

    if (roomCode && role) {
      // optional alert
      alert("You are already inside a multiplayer room.");

      window.location.href = "waiting-room.html";
    }
  </script>
  <script src="js/navbar.js" defer></script>

  <div class="container">
    <h1>🎮 Multiplayer Mode</h1>

    <input type="text" id="playerName" placeholder="Enter your name" required />

    <hr style="margin: 20px 0;">

    <h3>➕ Create a Room</h3>
    <button onclick="createRoom()">Create Room</button>

    <hr style="margin: 20px 0;">

    <h3>🔗 Join a Room</h3>
    <p>Enter the room code shared by the host.</p>
    <input type="text" id="roomCode" placeholder="Enter room code" />
    <button onclick="joinRoom()">Join Room</button>

    <p id="status" style="margin-top: 20px;"></p>
    <p id="copySuccess" style="color: lightgreen;"></p>
  </div>

  <script>

    // Autofill player name if stored
    const savedName = localStorage.getItem("playerName");
    if (savedName) {
      document.addEventListener("DOMContentLoaded", () => {
        const input = document.getElementById("playerName");
        if (input) input.value = savedName;
      });
    }
    document.addEventListener("DOMContentLoaded", () => {

      const input = document.getElementById("roomCode");

      input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
          joinRoom();
        }
      });

    });
    async function createRoom() {
     const name = document.getElementById("playerName").value.trim();

      if (!name) return alert("Enter your name");

      // 🔹 Get settings selected in game.html
      const difficulty = localStorage.getItem("difficulty");
      const language = localStorage.getItem("preferredLanguage");
      const topic = localStorage.getItem("selectedTopic");
      // 🔒 Only host (who came from game.html) can create room
      if (!difficulty || !language || !topic) {
        alert("Please select game settings first.");
        window.location.href = "game.html";
        return;
      }
      const res = await fetch("/api/room/create", {

        method: "POST",

        headers: { "Content-Type": "application/json" },

        body: JSON.stringify({

          name,
          playerId: localStorage.getItem("playerId") || "",

          // 🔹 Send game settings to backend
          difficulty,
          language,
          topic

        })

      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem("roomCode", data.code);
        localStorage.setItem("playerName", name);
        localStorage.setItem("playerRole", "host");

        document.getElementById("status").innerHTML = `
          ✅ Room created! Share this code: <strong>${data.code}</strong><br>
          <button onclick="copyRoomCode('${data.code}')">📋 Copy Code</button>
        `;

        window.location.href = "waiting-room.html";
      } else {
        document.getElementById("status").innerText = "❌ " + data.message;
      }
    }

    function copyRoomCode(code) {
      navigator.clipboard.writeText(code)
        .then(() => {
          document.getElementById("copySuccess").innerText = "✔ Copied to clipboard!";
          setTimeout(() => {
            document.getElementById("copySuccess").innerText = "";
          }, 2000);
        })
        .catch(() => alert("Failed to copy code."));
    }

    async function joinRoom() {
      const name = document.getElementById("playerName").value.trim();
      const code = document.getElementById("roomCode").value.trim();

      if (!name || !code) return alert("Enter name and room code");

      const res = await fetch(`/api/room/join/${code}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name,
          playerId: localStorage.getItem("playerId") || ""
        })
      });

      const data = await res.json();
      if (res.ok) {
        localStorage.setItem("roomCode", code);
        localStorage.setItem("playerName", name);
        localStorage.setItem("playerRole", "guest");
        window.location.href = "waiting-room.html";
      } else {
        document.getElementById("status").innerText = "❌ " + data.message;
      }
    }
  </script>

</body>
</html>
