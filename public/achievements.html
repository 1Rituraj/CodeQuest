<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CodeQuest - Achievements</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #playerAvatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    #playerAvatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      margin: 10px auto;
    }

    .progress-container {
      width: 100%;
      background: #ddd;
      border-radius: 10px;
      height: 20px;
      margin: 10px 0;
    }

    .progress-bar {
      background: limegreen;
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <!-- 🔒 Login protection -->
  <script>
    if (!localStorage.getItem("playerId")) {
      window.location.href = "login.html";
    }
  </script>

  <script src="js/navbar.js" defer></script>

  <div class="container">
    <h1>🏆 Your Achievements</h1>

    <h2 id="playerName"></h2>
    <div id="playerAvatar"></div>

    <p id="scoreDisplay"></p>
    <p id="completedDisplay"></p>

    <div class="progress-container">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <p id="messageDisplay"></p>

    <button onclick="restartGame()">🔁 Restart Game</button>
    <button onclick="goHome()">🏠 Home</button>
    <button onclick="window.location.href='certificate.html'">🎓 View Certificate</button>
  </div>

  <script>
    const score = parseInt(localStorage.getItem("score")) || 0;
    const completed = parseInt(localStorage.getItem("puzzlesCompleted")) || 0;
    const playerName = localStorage.getItem("playerName") || "Player";
    const avatarImg = localStorage.getItem("avatarBase64");
    const totalPuzzles = 7;

    // 🎯 Display name and avatar
    document.getElementById("playerName").innerText = `👋 Great job, ${playerName}!`;
    if (avatarImg) {
      const img = document.createElement("img");
      img.src = avatarImg;
      document.getElementById("playerAvatar").appendChild(img);
    }

    // 🧩 Score and puzzle display
    document.getElementById("scoreDisplay").innerText = `🎯 Score: ${score}`;
    document.getElementById("completedDisplay").innerText = `🧩 Puzzles Completed: ${completed}`;

    // 📊 Progress bar
    const progressPercent = Math.min((completed / totalPuzzles) * 100, 100);
    document.getElementById("progressBar").style.width = progressPercent + "%";

    // 💬 Feedback message
    const message =
      score >= 30 ? "🌟 Excellent work!" :
      score >= 20 ? "💪 Great effort!" :
      score >= 10 ? "👍 Keep learning!" : "🚀 Let’s try again!";
    document.getElementById("messageDisplay").innerText = message;

    // 🔁 Smart Restart (preserves login & watched videos)
    function restartGame() {
      const keysToKeep = ["playerId", "playerName", "avatarBase64", "theme"];
      const playerId = localStorage.getItem("playerId");
      if (playerId) keysToKeep.push(`learnWatched_${playerId}`);

      const backup = {};
      keysToKeep.forEach(key => backup[key] = localStorage.getItem(key));

      localStorage.clear();

      Object.entries(backup).forEach(([k, v]) => {
        if (v !== null) localStorage.setItem(k, v);
      });

      window.location.href = "game.html";
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
