<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Solved Questions - CodeQuest</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<script>
if (!localStorage.getItem("playerId")) {
  window.location.href = "login.html";
}
</script>

<div class="container">

<h1>📚 Solved Questions</h1>

<ul id="solvedList" style="list-style:none;padding:0;"></ul>

<button onclick="goProfile()">⬅ Back to Profile</button>

</div>

<script>

async function loadSolvedQuestions() {

  const userId = localStorage.getItem("playerId");

  const res = await fetch(`/api/users/${userId}/solved`);

  const solved = await res.json();

  const list = document.getElementById("solvedList");

  list.innerHTML = "";

  if (!solved || solved.length === 0) {
    list.innerHTML = "<li>No solved questions yet.</li>";
    return;
  }

  solved.forEach(q => {

    const li = document.createElement("li");

    li.style.marginBottom = "15px";
    li.style.padding = "10px";
    li.style.background = "#f0f9ff";
    li.style.borderRadius = "10px";
    li.style.color = "black";

    const solvedDate = new Date(q.createdAt)
      .toLocaleDateString("en-IN", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });

    li.innerHTML = `
      <strong>✔ ${q.question}</strong><br>
      Topic: ${q.topic} | Difficulty: ${q.difficulty}<br>
      Solved on: ${solvedDate}
    `;

    list.appendChild(li);

  });

}

function goProfile() {
  window.location.href = "profile.html";
}

loadSolvedQuestions();

</script>

</body>
</html>
