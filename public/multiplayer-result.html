<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Result - CodeQuest</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}

.container{
margin-top:80px;
}

.trophy{
font-size:100px;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.score{
font-size:24px;
margin-top:20px;
}

button{
margin-top:30px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🏁 Match Result</h1>

<div class="trophy" id="trophy"></div>

<h2 id="resultText"></h2>

<div class="score">
    Host Score: <span id="hostScore"></span><br>
    Guest Score: <span id="guestScore"></span><br><br>

    Host Correct Answers: <span id="hostCorrect"></span><br>
    Guest Correct Answers: <span id="guestCorrect"></span>
</div>

<button onclick="goHome()">Play Again</button>

</div>


<script>

const hostScore = localStorage.getItem("resultHostScore");
const guestScore = localStorage.getItem("resultGuestScore");
const winner = localStorage.getItem("resultWinner");

document.getElementById("hostScore").innerText = hostScore;
document.getElementById("guestScore").innerText = guestScore;
document.getElementById("hostCorrect").innerText = hostScore / 10;
document.getElementById("guestCorrect").innerText = guestScore / 10;

let resultText = "";
let trophy = "";

if(winner === "host"){
resultText = "🏆 Host Wins!";
trophy = "🏆";
}

else if(winner === "guest"){
resultText = "🏆 Guest Wins!";
trophy = "🏆";
}

else{
resultText = "🤝 It's a Draw!";
trophy = "🤝";
}

document.getElementById("resultText").innerText = resultText;
document.getElementById("trophy").innerText = trophy;

function goHome(){

localStorage.removeItem("roomCode");

window.location.href="multiplayer.html";

}

</script>

</body>
</html>
